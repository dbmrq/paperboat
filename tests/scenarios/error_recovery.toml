# ============================================================================
# Error Recovery Scenario
# ============================================================================
#
# Purpose: Tests failure handling and retry logic. The first implementation
# attempt fails, and the orchestrator retries with a modified task description.
#
# Expected Flow:
#   1. Planner creates a single-task plan
#   2. Planner calls complete(success=true)
#   3. Orchestrator calls implement("Fix database connection timeout bug")
#   4. Implementer 1 encounters error (config parsing failure)
#   5. Implementer 1 calls complete(success=false)
#   6. Orchestrator receives failure, decides to retry
#   7. Orchestrator calls implement("...focus on connection pool settings...")
#   8. Implementer 2 succeeds
#   9. Implementer 2 calls complete(success=true)
#   10. Orchestrator calls complete(success=true)
#
# Test Assertions:
#   - result.task_result.success == true (recovered from failure)
#   - result.implement_calls().len() == 2 (initial + retry)
#   - First implement call is generic
#   - Second implement call has more specific instructions
#
# Sessions Defined: 1 planner, 1 orchestrator, 2 implementers
# Mock Responses Defined: 2 (first fails, second succeeds)
#
# Note: The task_pattern in mock_tool_responses uses regex to differentiate
# the initial call from the retry call.
# ============================================================================

[scenario]
name = "error_recovery"
description = "Implementation failure and retry scenario"

# Planner session
[[planner_sessions]]
session_id = "planner-001"

[[planner_sessions.updates]]
delay_ms = 100
session_update = "agent_message_chunk"
content = "Creating a plan for fixing critical database bug.\n\n"

[[planner_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "[Calling create_task tool]"

[planner_sessions.updates.inject_mcp_tool_call]
tool = "create_task"
name = "Fix database connection timeout bug"
description = "Investigate connection pool settings, update timeout configuration, and add retry logic"
dependencies = []

[[planner_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "[Calling complete tool]"

[planner_sessions.updates.inject_mcp_tool_call]
tool = "complete"
success = true
message = "Plan created for bug fix"

[[planner_sessions.updates]]
delay_ms = 50
session_update = "agent_turn_finished"

# Orchestrator session: first implement fails, retry succeeds
[[orchestrator_sessions]]
session_id = "orchestrator-001"

[[orchestrator_sessions.updates]]
delay_ms = 100
session_update = "agent_message_chunk"
content = "Executing the bug fix plan.\n\n"

# First implement call (will fail)
[[orchestrator_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "[Calling implement tool - first attempt]"

[orchestrator_sessions.updates.inject_mcp_tool_call]
tool = "spawn_agents"
task = "Fix database connection timeout bug"

# Orchestrator receives failure, decides to retry
[[orchestrator_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "First attempt failed. Retrying with more specific instructions.\n"

[orchestrator_sessions.updates.inject_mcp_tool_call]
tool = "spawn_agents"
task = "Fix database connection timeout bug - focus on connection pool settings and add exponential backoff retry"

# Skip the planner's tracked task (since we're using raw task descriptions)
[[orchestrator_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "[Skipping tracked task since we used custom description]"

[orchestrator_sessions.updates.inject_mcp_tool_call]
tool = "skip_tasks"
task_ids = ["task001"]
reason = "Implemented with custom description"

# After successful retry, complete
[[orchestrator_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "Bug fix succeeded on retry.\n"

[orchestrator_sessions.updates.inject_mcp_tool_call]
tool = "complete"
success = true
message = "Bug fix completed after retry"

[[orchestrator_sessions.updates]]
delay_ms = 50
session_update = "agent_turn_finished"

# First implementer session: fails
[[implementer_sessions]]
session_id = "implementer-001"

[[implementer_sessions.updates]]
delay_ms = 100
session_update = "agent_message_chunk"
content = "Attempting to fix database timeout issue...\n"

[[implementer_sessions.updates]]
delay_ms = 150
session_update = "tool_call"
tool_title = "str-replace-editor"

[[implementer_sessions.updates]]
delay_ms = 100
session_update = "tool_result"

[implementer_sessions.updates.tool_result]
title = "str-replace-editor"
is_error = true
content = "Error: Could not parse the database config file"

[[implementer_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "Failed to apply fix due to config parsing error.\n"

[implementer_sessions.updates.inject_mcp_tool_call]
tool = "complete"
success = false
message = "Failed to fix bug - config file parsing error"

[[implementer_sessions.updates]]
delay_ms = 50
session_update = "agent_turn_finished"

# Second implementer session: succeeds
[[implementer_sessions]]
session_id = "implementer-002"

[[implementer_sessions.updates]]
delay_ms = 100
session_update = "agent_message_chunk"
content = "Retrying fix with focus on connection pool settings...\n"

[[implementer_sessions.updates]]
delay_ms = 150
session_update = "tool_call"
tool_title = "str-replace-editor"

[[implementer_sessions.updates]]
delay_ms = 100
session_update = "tool_result"

[implementer_sessions.updates.tool_result]
title = "str-replace-editor"
is_error = false
content = "Updated src/db/pool.rs"

[[implementer_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "Successfully fixed connection pool settings.\n"

[implementer_sessions.updates.inject_mcp_tool_call]
tool = "complete"
success = true
message = "Database timeout bug fixed successfully"

[[implementer_sessions.updates]]
delay_ms = 50
session_update = "agent_turn_finished"

# Mock tool responses
[[mock_tool_responses]]
tool_type = "SpawnAgents"
task_pattern = "^Fix database connection timeout bug$"

[mock_tool_responses.response]
success = false
summary = "Implementation failed"
error = "Config file parsing error - unexpected format"

[[mock_tool_responses]]
tool_type = "SpawnAgents"
task_pattern = ".*connection pool.*exponential backoff.*"

[mock_tool_responses.response]
success = true
summary = "Fixed connection pool settings with exponential backoff retry"
files_modified = ["src/db/pool.rs", "src/db/config.rs"]

