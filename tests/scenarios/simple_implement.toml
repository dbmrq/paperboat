# ============================================================================
# Simple Implementation Scenario
# ============================================================================
#
# Purpose: Tests the most basic successful flow in Villalobos - a single task
# that gets planned and implemented without any decomposition or retries.
#
# Expected Flow:
#   1. Planner receives goal
#   2. Planner calls create_task to create a task
#   3. Planner calls complete(success=true)
#   4. Orchestrator receives the plan
#   5. Orchestrator calls spawn_agents(task)
#   6. Implementer performs work (simulated tool calls)
#   7. Implementer calls complete(success=true)
#   8. Orchestrator calls complete(success=true)
#   9. Final TaskResult.success = true
#
# Test Assertions:
#   - result.task_result.success == true
#   - result.planner_was_spawned() == true
#   - result.orchestrator_was_spawned() == true
#   - result.implementer_was_spawned() == true
#   - result.implement_calls().len() == 1
#   - result.implement_calls()[0] contains "error handling"
#
# Sessions Defined: 1 planner, 1 orchestrator, 1 implementer
# Mock Responses Defined: 1 (for the spawn_agents call)
# ============================================================================

[scenario]
name = "simple_implement"
description = "Single task that gets implemented directly"

# Planner session: creates tasks and calls complete
[[planner_sessions]]
session_id = "planner-001"

[[planner_sessions.updates]]
delay_ms = 100
session_update = "agent_message_chunk"
content = "Analyzing the request... I'll create a plan for adding error handling.\n\n"

# Planner calls create_task tool via MCP
[[planner_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "[Calling create_task tool]"

[planner_sessions.updates.inject_mcp_tool_call]
tool = "create_task"
name = "Add error handling to login function"
description = "Add try-catch blocks, proper error logging, and meaningful error messages to the login function"
dependencies = []

# Planner calls complete tool via MCP
[[planner_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "[Calling complete tool]"

[planner_sessions.updates.inject_mcp_tool_call]
tool = "complete"
success = true
message = "Plan created successfully"

[[planner_sessions.updates]]
delay_ms = 50
session_update = "agent_turn_finished"

# Orchestrator session: executes the plan by calling implement
[[orchestrator_sessions]]
session_id = "orchestrator-001"

[[orchestrator_sessions.updates]]
delay_ms = 100
session_update = "agent_message_chunk"
content = "Executing the plan. Calling implement for the error handling task.\n\n"

# Orchestrator calls skip_tasks to mark the tracked task as not needed
# (since we're using a raw task description, not task_id)
[[orchestrator_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "[Calling skip_tasks to skip the planner's tracked task]"

[orchestrator_sessions.updates.inject_mcp_tool_call]
tool = "skip_tasks"
task_ids = ["task001"]
reason = "Implementing directly with custom description"

# Orchestrator calls spawn_agents tool via MCP
[[orchestrator_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "[Calling spawn_agents tool]"

[orchestrator_sessions.updates.inject_mcp_tool_call]
tool = "spawn_agents"
task = "Add error handling to login function with try-catch blocks, proper error logging, and meaningful error messages"

# Orchestrator calls complete after implement returns
[[orchestrator_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "Implementation complete. All tasks finished.\n"

[orchestrator_sessions.updates.inject_mcp_tool_call]
tool = "complete"
success = true
message = "All tasks completed successfully"

[[orchestrator_sessions.updates]]
delay_ms = 50
session_update = "agent_turn_finished"

# Implementer session: implements the task
[[implementer_sessions]]
session_id = "implementer-001"

[[implementer_sessions.updates]]
delay_ms = 100
session_update = "agent_message_chunk"
content = "Implementing error handling...\n"

[[implementer_sessions.updates]]
delay_ms = 200
session_update = "tool_call"
tool_title = "str-replace-editor"

[[implementer_sessions.updates]]
delay_ms = 300
session_update = "tool_result"

[implementer_sessions.updates.tool_result]
title = "str-replace-editor"
is_error = false
content = "File updated successfully"

[[implementer_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "Error handling added. Calling complete.\n"

[implementer_sessions.updates.inject_mcp_tool_call]
tool = "complete"
success = true
message = "Error handling implementation complete"

[[implementer_sessions.updates]]
delay_ms = 50
session_update = "agent_turn_finished"

# Mock tool response for implement calls
[[mock_tool_responses]]
tool_type = "SpawnAgents"
task_pattern = ".*error handling.*"

[mock_tool_responses.response]
success = true
summary = "Added try-catch blocks and error logging"
files_modified = ["src/auth/login.rs"]

