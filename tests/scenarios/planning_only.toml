# ============================================================================
# Planning Only Scenario
# ============================================================================
#
# Purpose: Tests the flow where planning occurs but no implementation is
# performed. This simulates plan-only mode or planning for review.
#
# Expected Flow:
#   1. Planner receives goal
#   2. Planner calls create_task to create tasks
#   3. Planner calls complete(success=true)
#   4. Orchestrator receives the plan
#   5. Orchestrator immediately calls complete(success=true) without implementing
#   6. Final TaskResult.success = true
#
# Test Assertions:
#   - result.task_result.success == true
#   - result.planner_was_spawned() == true
#   - result.orchestrator_was_spawned() == true
#   - result.implementer_was_spawned() == false
#   - result.implement_calls().is_empty() == true
#
# Sessions Defined: 1 planner, 1 orchestrator, 0 implementers
# Mock Responses Defined: 0 (no implement calls made)
# ============================================================================

[scenario]
name = "planning_only"
description = "Planner produces a plan, orchestrator immediately completes without implementation"

# Planner session: creates tasks and calls complete
[[planner_sessions]]
session_id = "planner-001"

[[planner_sessions.updates]]
delay_ms = 100
session_update = "agent_message_chunk"
content = "Analyzing the request... Creating a planning-only outline.\n\n"

# Planner calls create_task tool via MCP (Phase 1)
[[planner_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "[Calling create_task tool]"

[planner_sessions.updates.inject_mcp_tool_call]
tool = "create_task"
name = "Phase 1: Research"
description = "Investigate existing solutions and document requirements"
dependencies = []

# Planner calls create_task tool via MCP (Phase 2)
[[planner_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "[Calling create_task tool]"

[planner_sessions.updates.inject_mcp_tool_call]
tool = "create_task"
name = "Phase 2: Design"
description = "Create architecture diagram and define API contracts"
dependencies = ["Phase 1: Research"]

# Planner calls create_task tool via MCP (Phase 3)
[[planner_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "[Calling create_task tool]"

[planner_sessions.updates.inject_mcp_tool_call]
tool = "create_task"
name = "Phase 3: Implementation"
description = "Build core modules and write tests"
dependencies = ["Phase 2: Design"]

# Planner calls complete tool via MCP
[[planner_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "[Calling complete tool]"

[planner_sessions.updates.inject_mcp_tool_call]
tool = "complete"
success = true
message = "Plan created successfully for review"

[[planner_sessions.updates]]
delay_ms = 50
session_update = "agent_turn_finished"

# Orchestrator session: immediately completes (no implementation needed)
[[orchestrator_sessions]]
session_id = "orchestrator-001"

[[orchestrator_sessions.updates]]
delay_ms = 100
session_update = "agent_message_chunk"
content = "Reviewing the plan. No implementation tasks need to be executed at this time.\n\n"

# Orchestrator calls complete without calling implement
[[orchestrator_sessions.updates]]
delay_ms = 50
session_update = "agent_message_chunk"
content = "Completing as planning-only task.\n"

[orchestrator_sessions.updates.inject_mcp_tool_call]
tool = "complete"
success = true
message = "Plan reviewed and approved, no immediate implementation required"

[[orchestrator_sessions.updates]]
delay_ms = 50
session_update = "agent_turn_finished"

