name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Shared cache prefix for better cache reuse across jobs
  CACHE_PREFIX: ci-v1

jobs:
  # ============================================================
  # Fast checks - run first, fail fast on basic issues
  # ============================================================

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt -- --check

  lockfile:
    name: Cargo.lock Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check Cargo.lock is up to date
        run: cargo check --locked

  unused-deps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - name: Check for unused dependencies
        run: cargo machete

  # ============================================================
  # Security checks - important for every PR
  # ============================================================

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ github.token }}

  deny:
    name: Dependency & License Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all
          arguments: --all-features

  # ============================================================
  # Linting - requires build artifacts, shares cache
  # ============================================================

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Wait for fast checks to pass before spending time on compilation
    needs: [fmt, lockfile]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: ${{ env.CACHE_PREFIX }}-clippy
      - name: Clippy (default features)
        run: cargo clippy -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --all-features -- -D warnings
      - name: Clippy (no features)
        run: cargo clippy --no-default-features -- -D warnings

  # ============================================================
  # Build verification
  # ============================================================

  build:
    name: Build (${{ matrix.build-type }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [fmt, lockfile]
    strategy:
      fail-fast: true  # Fail fast on build errors
      matrix:
        build-type: [debug, release]
        include:
          - build-type: debug
            cargo-flags: ""
          - build-type: release
            cargo-flags: "--release"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: ${{ env.CACHE_PREFIX }}-${{ matrix.build-type }}
      - name: Build (default features)
        run: cargo build ${{ matrix.cargo-flags }}
      - name: Build (all features)
        run: cargo build --all-features ${{ matrix.cargo-flags }}
      - name: Build (no features)
        run: cargo build --no-default-features ${{ matrix.cargo-flags }}

  # ============================================================
  # Test execution
  # ============================================================

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [fmt, lockfile]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: ${{ env.CACHE_PREFIX }}-test
      - name: Run tests (all features)
        run: cargo test --all-features
      - name: Run tests (no features)
        run: cargo test --no-default-features
      # Note: Doc tests require a library target, which this binary-only crate doesn't have

  # ============================================================
  # Documentation
  # ============================================================

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [fmt, lockfile]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: ${{ env.CACHE_PREFIX }}-docs
      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # ============================================================
  # Final status check - required for branch protection
  # ============================================================

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [fmt, lockfile, unused-deps, security-audit, deny, clippy, build, test, docs]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.fmt.result }}"
            "${{ needs.lockfile.result }}"
            "${{ needs.unused-deps.result }}"
            "${{ needs.security-audit.result }}"
            "${{ needs.deny.result }}"
            "${{ needs.clippy.result }}"
            "${{ needs.build.result }}"
            "${{ needs.test.result }}"
            "${{ needs.docs.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" ]]; then
              echo "❌ One or more jobs failed or were cancelled"
              exit 1
            fi
          done
          echo "✅ All CI jobs passed!"

