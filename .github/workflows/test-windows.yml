name: Test Windows

# Manual trigger only - run this to verify Windows support
on:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run e2e test (requires API key)'
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================
  # Build and unit tests
  # ============================================================
  
  build-and-test:
    name: Build & Test
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: windows-e2e
          
      - name: Build (debug)
        run: cargo build --all-features --target x86_64-pc-windows-msvc
        
      - name: Build (release)
        run: cargo build --release --all-features --target x86_64-pc-windows-msvc
        
      - name: Run unit tests
        run: cargo test --all-features --target x86_64-pc-windows-msvc
        
      - name: Verify binary runs
        run: |
          .\target\x86_64-pc-windows-msvc\release\paperboat.exe --help
          Write-Host "✅ Binary runs successfully"

  # ============================================================
  # Install script test
  # ============================================================
  
  test-install-script:
    name: Install Script
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: windows-e2e
          
      - name: Build binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Test one-liner install
        shell: pwsh
        run: |
          $env:PAPERBOAT_BINARY_PATH = "$PWD\target\x86_64-pc-windows-msvc\release\paperboat.exe"
          $env:PAPERBOAT_INSTALL_DIR = "$PWD\test-install"
          $env:PAPERBOAT_VERSION = "0.0.0-test"
          New-Item -ItemType Directory -Path $env:PAPERBOAT_INSTALL_DIR -Force | Out-Null

          # Test the one-liner in a subprocess to simulate interactive shell behavior
          # (interactive PowerShell has $ErrorActionPreference = 'Continue' by default)
          pwsh -NoProfile -Command "exec sh -c 'curl -fsSL https://example.com|sh';& '$PWD\scripts\install.ps1'"

          # Verify installation
          & "$env:PAPERBOAT_INSTALL_DIR\paperboat.exe" --help
          Write-Host "✅ Install script test passed!"

  # ============================================================
  # E2E test (optional, requires API key)
  # ============================================================
  
  e2e-test:
    name: E2E Test
    runs-on: windows-latest
    timeout-minutes: 30
    if: ${{ inputs.run_e2e }}
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: windows-e2e
          
      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc
        
      - name: Run e2e test
        shell: pwsh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PAPERBOAT_SESSION_TIMEOUT: "120"
        run: |
          $TestDir = "$env:TEMP\paperboat_e2e_test"
          New-Item -ItemType Directory -Path $TestDir -Force | Out-Null
          
          # Create a simple test prompt
          $Prompt = @"
          Create a single file called hello.txt in $TestDir with the content "Hello from Windows!"
          After creating the file, call complete(success=true).
          "@
          
          Write-Host "Running paperboat with test prompt..."
          Write-Host "Test directory: $TestDir"
          
          # Run paperboat
          & .\target\release\paperboat.exe --backend anthropic $Prompt
          
          # Verify the file was created
          $ExpectedFile = Join-Path $TestDir "hello.txt"
          if (Test-Path $ExpectedFile) {
              $Content = Get-Content $ExpectedFile -Raw
              Write-Host "✅ File created successfully!"
              Write-Host "Content: $Content"
          } else {
              Write-Host "❌ Expected file not found: $ExpectedFile"
              Get-ChildItem $TestDir -Recurse | ForEach-Object { Write-Host $_.FullName }
              exit 1
          }
          
          # Cleanup
          Remove-Item -Path $TestDir -Recurse -Force
          Write-Host "✅ E2E test passed!"

  # ============================================================
  # Summary
  # ============================================================
  
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, test-install-script]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Build & Test: ${{ needs.build-and-test.result }}"
          echo "Install Script: ${{ needs.test-install-script.result }}"
          if [[ "${{ needs.build-and-test.result }}" == "success" && "${{ needs.test-install-script.result }}" == "success" ]]; then
            echo "✅ All Windows tests passed!"
          else
            echo "❌ Some tests failed"
            exit 1
          fi

